    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #dde3ea;
            --accent: #1a73e8;
            --green: #1e8c45;
            --red: #d93025;
            --purple: #7c4dff;
            --yellow: #e37400;
            --text: #1f2937;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', 'Yu Gothic', '游ゴシック', YuGothic, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            gap: 22px;
        }
        header { text-align: center; }
        h1 { font-size: 1.8em; color: var(--accent); margin-bottom: 4px; }
        .subtitle { color: var(--muted); font-size: 0.9em; }

        .clock-display {
            font-family: 'Courier New', monospace;
            font-size: 2.4em;
            font-weight: bold;
            color: var(--green);
            background: var(--surface);
            padding: 16px 32px;
            border-radius: 12px;
            border: 1px solid var(--surface2);
            letter-spacing: 4px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: var(--muted);
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
        }
        .dot.active {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        label { color: var(--muted); font-size: 0.85em; white-space: nowrap; }
        select {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--surface2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            background: var(--accent);
            color: #0d1117;
            transition: filter 0.15s;
        }
        button:hover { filter: brightness(1.1); }
        button.stop { background: var(--red); color: white; }

        .volume-warning {
            background: var(--yellow);
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: bold;
            display: none;
        }
        .volume-warning.show { display: block; }

        .bit-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            max-width: 360px;
            width: 100%;
        }
        .bit-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.62em;
            font-weight: bold;
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--surface2);
            transition: all 0.1s;
        }
        .bit-cell.marker  { background: var(--purple); color: white; border-color: var(--purple); }
        .bit-cell.bit1    { background: var(--red);    color: white; border-color: var(--red); }
        .bit-cell.bit0    { background: var(--accent); color: white; border-color: var(--accent); }
        .bit-cell.current { outline: 2px solid var(--yellow); outline-offset: 1px; }
        .bit-cell.past    { opacity: 0.45; }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 0.8em;
            color: var(--muted);
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

        .instructions {
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-radius: 12px;
            padding: 20px;
            max-width: 360px;
            width: 100%;
        }
        .instructions h3 { color: var(--accent); margin-bottom: 12px; font-size: 0.95em; }
        .instructions ol { padding-left: 1.3em; }
        .instructions li { margin-bottom: 8px; font-size: 0.85em; line-height: 1.5; }
        .note { margin-top: 12px; font-size: 0.8em; color: var(--muted); padding: 8px; background: var(--surface2); border-radius: 6px; }
    </style>
</head>
<body>
    <header>
        <h1>JJY シミュレーター</h1>
        <p class="subtitle">電波時計 時刻合わせ補助ツール</p>
    </header>

    <div class="clock-display" id="clock">--:--:-- JST</div>

    <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">停止中</span>
    </div>

    <div class="status-bar" style="font-size:0.8em;">
        <div class="dot" id="ntpDot"></div>
        <span id="ntpText">NTP未同期</span>
    </div>

    <div class="volume-warning" id="volWarning">⚠ 音量を最大にしてください</div>

    <div class="controls">
        <div class="control-row">
            <label>周波数：</label>
            <select id="frequency">
                <option value="1000">1 kHz</option>
                <option value="3000">3 kHz</option>
                <option value="5000">5 kHz</option>
                <option value="10000" selected>10 kHz（推奨）</option>
                <option value="15000">15 kHz</option>
                <option value="20000">20 kHz</option>
            </select>
        </div>
        <button id="mainBtn" onclick="toggle()">▶ 開始</button>
    </div>

    <div class="bit-grid" id="bitGrid"></div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--purple)"></div>
            <span>マーカー (0.2s)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--red)"></div>
            <span>1ビット (0.5s)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--accent)"></div>
            <span>0ビット (0.8s)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--yellow)"></div>
            <span>現在位置</span>
        </div>
    </div>

    <div class="instructions">
        <h3>使い方</h3>
        <ol>
            <li>端末の<strong>音量を最大</strong>にする</li>
            <li>「開始」ボタンを押す</li>
            <li>端末を電波時計の<strong>背面・側面のアンテナ部分</strong>に密着させる</li>
            <li>そのまま<strong>数分間</strong>待つ</li>
            <li>受信できない場合は周波数を変えて再試行</li>
        </ol>
        <div class="note">
            ⚠ 本ツールは実験的なものです。実際のJJY電波（40/60kHz）ではなく、
            音声回路の電磁ノイズを利用するため、効果は環境によって異なります。
        </div>
    </div>

    <script>
    'use strict';

    // --- State ---
    let audioCtx = null;
    let oscillator = null;
    let gainNode = null;
    let isRunning = false;
    let scheduleTimer = null;
    let displayInterval = null;
    let currentBits = null;
    let currentMinuteAudioStart = 0;

    // --- NTP via HTTP ---
    let serverOffset = 0; // サーバーUTC ms - ローカルDate.now() ms
    let ntpSyncTimer = null;

    async function syncNTP() {
        const localBefore = Date.now();
        try {
            const res = await fetch(`https://timeapi.io/api/time/current/zone?timeZone=Asia/Tokyo&_=${localBefore}`, { cache: 'no-store' });
            const localAfter = Date.now();
            const rtt = localAfter - localBefore;
            const data = await res.json();
            // dateTime はJST時刻文字列 → UTC msに変換
            const serverMs = new Date(data.dateTime + '+09:00').getTime() + rtt / 2; // 片道分補正
            serverOffset = serverMs - localAfter;
            const offsetSec = (serverOffset / 1000).toFixed(3);
            const offsetStr = serverOffset >= 0 ? `+${offsetSec}` : `${offsetSec}`;
            document.getElementById('ntpDot').style.background = 'var(--green)';
            document.getElementById('ntpDot').style.boxShadow = '0 0 8px var(--green)';
            document.getElementById('ntpText').textContent = `NTP同期済 (RTT: ${rtt}ms / ローカルのズレ: ${offsetStr}s)`;
        } catch (e) {
            document.getElementById('ntpDot').style.background = 'var(--red)';
            document.getElementById('ntpDot').style.boxShadow = 'none';
            document.getElementById('ntpText').textContent = 'NTP同期エラー（ローカル時刻使用中）';
        }
    }

    // --- Time ---
    function getJST() {
        // serverOffset でサーバーUTCに補正 → +9h でJST
        return new Date(Date.now() + serverOffset + 9 * 60 * 60 * 1000);
    }

    function getDayOfYear(d) {
        const start = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.floor((d - start) / 86400000) + 1;
    }

    // --- JJY Encoding (JST, minute boundary) ---
    function encodeJJY(minuteJst) {
        const min = minuteJst.getUTCMinutes();
        const hr  = minuteJst.getUTCHours();
        const yr  = minuteJst.getUTCFullYear() % 100;
        const day = getDayOfYear(minuteJst);
        const dow = minuteJst.getUTCDay();

        const bits = new Array(60).fill(0);

        // Minutes BCD: tens at 1-3 (40,20,10), ones at 5-8 (8,4,2,1)
        const mt = Math.floor(min / 10), mo = min % 10;
        bits[1] = (mt >> 2) & 1;  bits[2] = (mt >> 1) & 1;  bits[3] = mt & 1;
        bits[5] = (mo >> 3) & 1;  bits[6] = (mo >> 2) & 1;
        bits[7] = (mo >> 1) & 1;  bits[8] = mo & 1;

        // Hours BCD: tens at 12-13 (20,10), ones at 15-18 (8,4,2,1)
        const ht = Math.floor(hr / 10), ho = hr % 10;
        bits[12] = (ht >> 1) & 1; bits[13] = ht & 1;
        bits[15] = (ho >> 3) & 1; bits[16] = (ho >> 2) & 1;
        bits[17] = (ho >> 1) & 1; bits[18] = ho & 1;

        // Day of year: hundreds at 22-23, tens at 25-28, ones at 30-33
        const dh = Math.floor(day / 100);
        const dt = Math.floor((day % 100) / 10);
        const do_ = day % 10;
        bits[22] = (dh >> 1) & 1; bits[23] = dh & 1;
        bits[25] = (dt >> 3) & 1; bits[26] = (dt >> 2) & 1;
        bits[27] = (dt >> 1) & 1; bits[28] = dt & 1;
        bits[30] = (do_ >> 3) & 1; bits[31] = (do_ >> 2) & 1;
        bits[32] = (do_ >> 1) & 1; bits[33] = do_ & 1;

        // Year BCD: tens at 42-45, ones at 46-48 + 50
        const yt = Math.floor(yr / 10), yo = yr % 10;
        bits[42] = (yt >> 3) & 1; bits[43] = (yt >> 2) & 1;
        bits[44] = (yt >> 1) & 1; bits[45] = yt & 1;
        bits[46] = (yo >> 3) & 1; bits[47] = (yo >> 2) & 1;
        bits[48] = (yo >> 1) & 1; bits[50] = yo & 1;

        // Day of week at 51-53
        bits[51] = (dow >> 2) & 1; bits[52] = (dow >> 1) & 1; bits[53] = dow & 1;

        // Parity: PA1(36)=even parity for hours, PA2(37)=even parity for minutes
        bits[36] = [12,13,15,16,17,18].reduce((a, i) => a ^ bits[i], 0);
        bits[37] = [1,2,3,5,6,7,8].reduce((a, i) => a ^ bits[i], 0);

        // Markers at 0,9,19,29,39,49,59
        [0, 9, 19, 29, 39, 49, 59].forEach(p => { bits[p] = 2; });

        return bits;
    }

    // --- Audio Scheduling ---
    // JJY: carrier drops to ~10% amplitude at start of each second
    //   Marker = 0.2s low, bit 1 = 0.5s low, bit 0 = 0.8s low
    function scheduleMinute(audioStart, bits) {
        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(1.0, Math.max(audioStart, now));
        for (let s = 0; s < 60; s++) {
            const t = audioStart + s;
            if (t + 1 < now) continue; // skip already-past seconds
            const dur = bits[s] === 2 ? 0.2 : bits[s] === 1 ? 0.5 : 0.8;
            gainNode.gain.setValueAtTime(0.05, t);
            gainNode.gain.setValueAtTime(1.0, t + dur);
        }
    }

    function scheduleNext() {
        if (!isRunning) return;
        const nextStart = currentMinuteAudioStart + 60;

        // Determine what the next minute's JST time is
        const jst = getJST();
        const sec = jst.getUTCSeconds();
        const ms  = jst.getUTCMilliseconds();
        // Advance to next minute boundary
        const nextMinuteJst = new Date(jst.getTime() + (60 - sec) * 1000 - ms);
        nextMinuteJst.setUTCSeconds(0, 0);

        currentBits = encodeJJY(nextMinuteJst);
        scheduleMinute(nextStart, currentBits);
        currentMinuteAudioStart = nextStart;

        // Re-schedule 2s before the end of each minute
        scheduleTimer = setTimeout(scheduleNext, 60000);
    }

    // --- UI ---
    function initGrid() {
        const grid = document.getElementById('bitGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 60; i++) {
            const cell = document.createElement('div');
            cell.className = 'bit-cell';
            cell.id = `b${i}`;
            cell.textContent = i;
            grid.appendChild(cell);
        }
    }

    function updateDisplay() {
        const jst = getJST();
        const h = String(jst.getUTCHours()).padStart(2, '0');
        const m = String(jst.getUTCMinutes()).padStart(2, '0');
        const s = String(jst.getUTCSeconds()).padStart(2, '0');
        const ms = String(jst.getUTCMilliseconds()).padStart(3, '0');
        document.getElementById('clock').textContent = `${h}:${m}:${s}.${ms} JST`;

        if (!isRunning || !currentBits) return;

        const sec = jst.getUTCSeconds();
        document.getElementById('statusText').textContent = `送信中 — ${m}分${s}秒目`;

        for (let i = 0; i < 60; i++) {
            const el = document.getElementById(`b${i}`);
            el.className = 'bit-cell';
            if      (currentBits[i] === 2) el.classList.add('marker');
            else if (currentBits[i] === 1) el.classList.add('bit1');
            else                           el.classList.add('bit0');
            if      (i === sec) el.classList.add('current');
            else if (i < sec)   el.classList.add('past');
        }
    }

    function toggle() {
        isRunning ? stop() : start();
    }

    function start() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            alert('このブラウザはWeb Audio APIに対応していません。');
            return;
        }

        oscillator = audioCtx.createOscillator();
        gainNode   = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.value = parseInt(document.getElementById('frequency').value);
        oscillator.type = 'sine';
        gainNode.gain.value = 1.0;
        oscillator.start();

        isRunning = true;

        // Align audio timeline with real JST time
        const jst = getJST();
        const sec = jst.getUTCSeconds();
        const ms  = jst.getUTCMilliseconds();
        currentMinuteAudioStart = audioCtx.currentTime - sec - ms / 1000;

        // Encode and schedule current minute
        const minuteJst = new Date(jst.getTime() - sec * 1000 - ms);
        currentBits = encodeJJY(minuteJst);
        scheduleMinute(currentMinuteAudioStart, currentBits);

        // Schedule next minute refresh ~2s before current minute ends
        const msUntilEnd = (60 - sec) * 1000 - ms;
        scheduleTimer = setTimeout(scheduleNext, Math.max(0, msUntilEnd - 2000));

        let rafId;
        function rafLoop() { updateDisplay(); rafId = requestAnimationFrame(rafLoop); }
        rafId = requestAnimationFrame(rafLoop);
        displayInterval = { cancel: () => cancelAnimationFrame(rafId) };

        // 毎秒サーバーから最新時刻を取得
        syncNTP();
        ntpSyncTimer = setInterval(syncNTP, 1000);

        document.getElementById('mainBtn').textContent = '■ 停止';
        document.getElementById('mainBtn').classList.add('stop');
        document.getElementById('statusDot').classList.add('active');
        document.getElementById('statusText').textContent = '送信中...';
        document.getElementById('volWarning').classList.add('show');
    }

    function stop() {
        isRunning = false;
        if (scheduleTimer)   clearTimeout(scheduleTimer);
        if (displayInterval) displayInterval.cancel();
        if (ntpSyncTimer)    clearInterval(ntpSyncTimer);
        if (oscillator) { try { oscillator.stop(); } catch (e) {} }
        if (audioCtx)   audioCtx.close();
        oscillator = null; gainNode = null; audioCtx = null; currentBits = null;

        document.getElementById('mainBtn').textContent = '▶ 開始';
        document.getElementById('mainBtn').classList.remove('stop');
        document.getElementById('statusDot').classList.remove('active');
        document.getElementById('statusText').textContent = '停止中';
        document.getElementById('volWarning').classList.remove('show');

        for (let i = 0; i < 60; i++) {
            document.getElementById(`b${i}`).className = 'bit-cell';
        }
    }

    // Init
    initGrid();
    (function clockLoop() { updateDisplay(); requestAnimationFrame(clockLoop); })();
    syncNTP(); // ページ読み込み時に初回同期
    </script>
</body>
</html>
